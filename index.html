<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HyperCare AI Secure</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2d89ef">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; margin:0; background:#f4f8fb; }
.container { padding:20px; padding-bottom:80px; }
.card { background:white; padding:20px; margin-bottom:20px; border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
input, button { width:100%; padding:12px; font-size:16px; margin-bottom:10px; }
button { background:#2d89ef; color:white; border:none; border-radius:8px; }
button:hover { background:#1b5fa7; }
nav {
  display:flex;
  justify-content:space-around;
  background:#2d89ef;
  color:white;
  padding:10px;
}
nav button { background:none; color:white; font-size:14px; }
@media (max-width:768px){
  nav { position:fixed; bottom:0; width:100%; }
}
@media (min-width:769px){
  nav { position:sticky; top:0; }
}
.toast {
  position:fixed;
  top:20px;
  right:20px;
  background:green;
  color:white;
  padding:10px 20px;
  border-radius:5px;
  display:none;
}
</style>
</head>

<body>

<nav>
<button onclick="showSection('dashboard')">Dashboard</button>
<button onclick="showSection('meds')">Medications</button>
<button onclick="showSection('devices')">Devices</button>
<button onclick="showSection('privacy')">Privacy</button>
</nav>

<div class="container">

<div id="dashboard" class="section">
<div class="card">
<h2>Blood Pressure Entry</h2>
<input type="number" id="sys" placeholder="Systolic">
<input type="number" id="dia" placeholder="Diastolic">
<button onclick="saveBP()">Save Reading</button>
<button onclick="startVoice()">🎤 Voice Input</button>
<p id="classification"></p>
</div>

<div class="card">
<h2>Trend Graph</h2>
<canvas id="chart"></canvas>
</div>
</div>

<div id="meds" class="section" style="display:none">
<div class="card">
<h2>Medication List</h2>
<input type="text" id="medName" placeholder="Medication">
<input type="text" id="medDose" placeholder="Dose">
<button onclick="addMed()">Add</button>
<ul id="medList"></ul>
</div>
</div>

<div id="devices" class="section" style="display:none">
<div class="card">
<h2>Bluetooth BP Monitor</h2>
<button onclick="connectDevice()">Connect Device</button>
<p id="deviceStatus">Not connected</p>
</div>
</div>

<div id="privacy" class="section" style="display:none">
<div class="card">
<h2>Privacy & Security</h2>
<p>✅ Data stored locally</p>
<p>✅ Mock AES encryption enabled</p>
<p>✅ WebAuthn biometric login</p>
<p>✅ Audit logging active</p>
<button onclick="registerBiometric()">Register Biometric</button>
<button onclick="loginBiometric()">Login with Biometrics</button>
<button onclick="updateGuidelines()">Check Guideline Updates</button>
</div>
</div>

</div>

<div class="toast" id="toast">Saved ✅</div>

<script>
/* ---------------- STORAGE + MOCK ENCRYPTION ---------------- */
function encrypt(data){ return btoa(JSON.stringify(data)); }
function decrypt(data){ return JSON.parse(atob(data)); }

/* ---------------- AUDIT LOGGING ---------------- */
function logAction(action){
let logs = JSON.parse(localStorage.getItem("audit")||"[]");
logs.push({action,date:new Date().toLocaleString()});
localStorage.setItem("audit",JSON.stringify(logs));
}

/* ---------------- SECTIONS ---------------- */
function showSection(id){
document.querySelectorAll(".section").forEach(s=>s.style.display="none");
document.getElementById(id).style.display="block";
}

/* ---------------- TOAST ---------------- */
function showToast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",2000);
}

/* ---------------- BP + GRAPH ---------------- */
let readings = decrypt(localStorage.getItem("bp")||encrypt([]));
let ctx = document.getElementById("chart").getContext("2d");
let chart = new Chart(ctx,{
type:"line",
data:{labels:[],datasets:[
{label:"Systolic",data:[],borderColor:"red"},
{label:"Diastolic",data:[],borderColor:"blue"}
]}
});

function updateChart(){
chart.data.labels = readings.map(r=>r.date);
chart.data.datasets[0].data = readings.map(r=>r.sys);
chart.data.datasets[1].data = readings.map(r=>r.dia);
chart.update();
}
updateChart();

function classify(sys,dia){
let text="";
if(sys>=180||dia>=120) text="⚠ Crisis";
else if(sys>=140||dia>=90) text="Stage 2";
else if(sys>=130||dia>=80) text="Stage 1";
else text="Normal/Elevated";
document.getElementById("classification").innerText=text;
}

function saveBP(){
let sys=parseInt(sys.value);
let dia=parseInt(dia.value);
if(!sys||!dia)return;
let entry={sys,dia,date:new Date().toLocaleDateString()};
readings.push(entry);
localStorage.setItem("bp",encrypt(readings));
classify(sys,dia);
updateChart();
showToast("Reading Saved ✅");
logAction("BP Saved");
}

/* ---------------- VOICE INPUT FIX ---------------- */
function startVoice(){
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if(!SpeechRecognition){alert("Not supported");return;}
let recognition=new SpeechRecognition();
recognition.onresult=function(e){
let text=e.results[0][0].transcript;
let nums=text.match(/\d+/g);
if(nums && nums.length>=2){
document.getElementById("sys").value=nums[0];
document.getElementById("dia").value=nums[1];
showToast("Voice Captured ✅");
}
};
recognition.start();
}

/* ---------------- MEDICATION ---------------- */
let meds=JSON.parse(localStorage.getItem("meds")||"[]");
function addMed(){
let name=medName.value;
let dose=medDose.value;
if(!name||!dose)return;
meds.push({name,dose});
localStorage.setItem("meds",JSON.stringify(meds));
displayMeds();
showToast("Medication Added ✅");
logAction("Medication Added");
}
function displayMeds(){
medList.innerHTML="";
meds.forEach(m=>{
let li=document.createElement("li");
li.textContent=m.name+" - "+m.dose;
medList.appendChild(li);
});
}
displayMeds();

/* ---------------- WEB BLUETOOTH MOCK ---------------- */
async function connectDevice(){
try{
await navigator.bluetooth.requestDevice({
acceptAllDevices:true
});
deviceStatus.innerText="Mock Device Connected ✅";
showToast("Device Connected ✅");
logAction("Bluetooth Connected");
}catch(e){
alert("Bluetooth cancelled or not supported");
}
}

/* ---------------- WEB AUTHN MOCK ---------------- */
async function registerBiometric(){
if(!window.PublicKeyCredential){alert("Not supported");return;}
showToast("Biometric Registered (Mock) ✅");
logAction("Biometric Registered");
}

async function loginBiometric(){
showToast("Biometric Login Success ✅");
logAction("Biometric Login");
}

/* ---------------- GUIDELINE UPDATE MOCK ---------------- */
function updateGuidelines(){
let currentVersion="2024.1";
let mockRemoteVersion="2026.1";
if(mockRemoteVersion!==currentVersion){
showToast("New Hypertension Guideline Available ✅");
logAction("Guideline Updated");
}
}

</script>

</body>
</html>
